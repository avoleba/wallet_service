services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - config.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet"]
      interval: 2s
      timeout: 2s
      retries: 10

  wallet-api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - config.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
